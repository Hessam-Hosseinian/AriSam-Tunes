name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag in SemVer format, for example v1.0.0
        required: true
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Resolve release version
        id: version
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$DISPATCH_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use SemVer, for example v1.2.3 or v1.2.3-beta.1." >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"

          if (( 10#$minor > 999 || 10#$patch > 999 )); then
            echo "Android release tags require minor and patch components between 0 and 999." >&2
            exit 1
          fi

          version_code=$((10#$major * 1000000 + 10#$minor * 1000 + 10#$patch))

          if (( version_code < 1 || version_code > 2100000000 )); then
            echo "The SemVer-derived Android version code is outside the supported range." >&2
            exit 1
          fi

          prerelease=false
          if [[ "$tag" == *-* || "$DISPATCH_PRERELEASE" == "true" ]]; then
            prerelease=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version_name=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Restore release keystore
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=false
          for variable in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!variable:-}" ]]; then
              echo "Missing required GitHub Actions secret: $variable" >&2
              missing=true
            fi
          done

          if [[ "$missing" == "true" ]]; then
            echo "Configure the Android release signing secrets described in README.md." >&2
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/arisam-tunes-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Test and build signed release APK
        working-directory: android
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://10.0.2.2:8080' }}
          RELEASE_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          RELEASE_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.keystore_path }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:testDebugUnitTest :app:lintRelease :app:assembleRelease --stacktrace

      - name: Verify and package APK
        id: package
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          source_apk="android/app/build/outputs/apk/release/app-release.apk"
          asset_apk="$RUNNER_TEMP/AriSam-Tunes-$RELEASE_TAG.apk"
          checksum="$asset_apk.sha256"

          test -f "$source_apk"
          cp "$source_apk" "$asset_apk"

          apksigner_path="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner_path"
          "$apksigner_path" verify --verbose --print-certs "$asset_apk"

          (
            cd "$RUNNER_TEMP"
            sha256sum "$(basename "$asset_apk")" > "$(basename "$checksum")"
          )
          echo "apk=$asset_apk" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: AriSam-Tunes-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.package.outputs.apk }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.prerelease }}
          APK_PATH: ${{ steps.package.outputs.apk }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" "$CHECKSUM_PATH" --clobber
            exit 0
          fi

          release_args=(
            release create "$RELEASE_TAG"
            "$APK_PATH"
            "$CHECKSUM_PATH"
            --title "AriSam Tunes $RELEASE_TAG"
            --generate-notes
            --target "$GITHUB_SHA"
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh "${release_args[@]}"
