<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>AriSam Tunes — Application Demo</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f8fafc;
        background: #080b12;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background:
          radial-gradient(circle at top, rgb(124 58 237 / 28%), transparent 42%),
          #080b12;
      }

      main {
        width: min(100%, 620px);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(2rem, 7vw, 3.25rem);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 24px;
        color: #aeb7c7;
      }

      video {
        display: block;
        width: min(100%, 442px);
        max-height: 78vh;
        margin: 0 auto;
        border: 1px solid rgb(255 255 255 / 12%);
        border-radius: 24px;
        background: #000;
        box-shadow: 0 28px 80px rgb(0 0 0 / 50%);
      }

      a {
        display: inline-block;
        margin-top: 24px;
        color: #c4b5fd;
        text-underline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AriSam Tunes</h1>
      <p>Full application walkthrough</p>
      <video controls playsinline preload="metadata" poster="media/home-discovery.png">
        <source src="media/arisam-tunes-demo.mp4" type="video/mp4">
        Your browser does not support HTML5 video.
      </video>
      <a href="https://github.com/Hessam-Hosseinian/AriSam-Tunes">Back to the repository</a>
    </main>
  </body>
</html>
